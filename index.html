<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人狼GMツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

input, button, textarea {
  margin: 5px;
  padding: 6px;
  width: 90%;
  max-width: 400px;
}

.box {
  border: 1px solid #ccc;
  padding: 15px;
  margin-top: 20px;
}

.player { margin: 5px; }

.playerBtn {
  display: block;
  margin: 5px auto;
  padding: 10px;
}

.dead {
  background-color: #ccc;
  color: #666;
}
</style>
</head>

<body>

<h1>人狼GMツール</h1>

<!-- ===== フェーズ表示 ===== -->
<div class="box">
  <h2 id="phase"></h2>
  <div id="day"></div>
</div>

<!-- ===== 準備UI ===== -->
<div id="prepareUI" class="box">

  シード値<br>
  <input id="seed"><br>

  参加人数<br>
  <input id="count" type="number" min="5" value="5" onchange="createInputs()"><br>

  <div id="players"></div>

  <button onclick="generate()">役職生成</button>

  <h3>役職一覧</h3>
  <div id="result"></div>

  <h3>PL用URL</h3>
  <textarea id="url" rows="3"></textarea>

</div>

<!-- ===== 共通UI（安全版） ===== -->
<div id="gameUI" class="box" style="display:none;">

  <h3>プレイヤー</h3>
  <div id="playerList"></div>

  <h3>PL用URL</h3>
  <textarea id="urlDisplay" rows="3" readonly></textarea>

</div>

<!-- ===== 操作 ===== -->
<div class="box">
  <button id="startBtn" onclick="startGame()">ゲーム開始</button>
  <button id="nextBtn" onclick="nextPhase()">次のフェーズへ</button>
  <button id="endBtn" onclick="forceEnd()">強制終了</button>
</div>

<script>

/* ===============================
   フェーズ
================================ */
const PHASE = {
  PREPARE: "準備",
  MORNING: "朝",
  VOTE: "投票",
  NIGHT: "夜",
  RESULT: "終了"
};

/* ===============================
   状態
================================ */
let state = {
  phase: PHASE.PREPARE,
  day: 0,
  players: [],
  roles: [],
  alive: [],
  url: ""
};

/* ===============================
   描画（UIのみ）
================================ */
function render() {

  document.getElementById("phase").innerText =
    `フェーズ：${state.phase}`;

  document.getElementById("day").innerText =
    (state.phase === PHASE.PREPARE || state.phase === PHASE.RESULT)
      ? ""
      : `日数：${state.day}日目`;

  // ボタン制御
  const startBtn = document.getElementById("startBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const endBtn   = document.getElementById("endBtn");

  if (state.phase === PHASE.PREPARE) {
    startBtn.style.display = "inline-block";
    nextBtn.style.display  = "none";
    endBtn.style.display   = "none";
  } else if (state.phase === PHASE.RESULT) {
    startBtn.style.display = "inline-block";
    nextBtn.style.display  = "none";
    endBtn.style.display   = "none";
  } else {
    startBtn.style.display = "none";
    nextBtn.style.display  = "inline-block";
    endBtn.style.display   = "inline-block";
  }

  // UI切替
  document.getElementById("prepareUI").style.display =
    (state.phase === PHASE.PREPARE) ? "block" : "none";

  const gameUI = document.getElementById("gameUI");
  gameUI.style.display =
    (state.phase !== PHASE.PREPARE && state.phase !== PHASE.RESULT)
      ? "block" : "none";

  // 共通UI描画
  if (state.players.length > 0) {

    const playerList = document.getElementById("playerList");
    playerList.innerHTML = "";

    state.players.forEach((p, i) => {
      const btn = document.createElement("button");
      btn.className = "playerBtn";

      if (!state.alive[i]) btn.classList.add("dead");

      btn.textContent = `${i+1}番：${p}`;
      btn.onclick = () => console.log(p);

      playerList.appendChild(btn);
    });

    document.getElementById("urlDisplay").value = state.url;
  }
}

/* ===============================
   入力欄生成（壊さない）
================================ */
function createInputs() {
  const count = Number(document.getElementById("count").value);
  const div = document.getElementById("players");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    div.innerHTML += `<input class="player" placeholder="プレイヤー名${i+1}">`;
  }
}
createInputs();

/* ===============================
   シード乱数
================================ */
function seededRandom(seed) {
  let t = seed;
  return function() {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ t >>> 15, 1 | t);
    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
    return ((r ^ r >>> 14) >>> 0) / 4294967296;
  };
}

/* ===============================
   役職生成（安全版）
================================ */
function generate() {

  const seedText = document.getElementById("seed").value;
  const count = Number(document.getElementById("count").value);
  const inputs = document.querySelectorAll(".player");

  const names = Array.from(inputs).map(i => i.value.trim());

  if (!seedText) return alert("シード値を入力してください");
  if (names.includes("")) return alert("名前を入力してください");
  if (new Set(names).size !== names.length) return alert("名前が重複しています");

  const roleConfig = {
    5:["村人","村人","村人","占い師","人狼"],
    6:["村人","村人","村人","村人","占い師","人狼"],
    7:["村人","村人","村人","村人","占い師","人狼","狂人"],
    8:["村人","村人","村人","村人","占い師","霊能者","人狼","人狼"],
    9:["村人","村人","村人","村人","占い師","霊能者","人狼","人狼","狂人"]
    10:["村人","村人","村人","村人","村人","占い師","霊能者","人狼","人狼","狂人"]
    11:["村人","村人","村人","村人","村人","占い師","霊能者","狩人","人狼","人狼","狂人"]
    12:["村人","村人","村人","村人","村人","村人","占い師","霊能者","狩人","人狼","人狼","狂人"]
    13:["村人","村人","村人","村人","村人","村人","占い師","霊能者","狩人","人狼","人狼","人狼","狂人"]
  };

  if (!roleConfig[count]) {
    alert("この人数には未対応です");
    return;
  }

  let seed = 0;
  for (let c of seedText) seed += c.charCodeAt(0);
  const rand = seededRandom(seed);

  let roles = [...roleConfig[count]];

  for (let i = roles.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [roles[i], roles[j]] = [roles[j], roles[i]];
  }

  state.players = names;
  state.roles = roles;
  state.alive = names.map(() => true);

  // URL
  const params = new URLSearchParams();
  params.set("seed", seedText);
  params.set("names", names.join(","));
  params.set("count", count);

  const url = location.origin + location.pathname.replace("index.html","") +
              "player.html?" + params.toString();

  state.url = url;
  document.getElementById("url").value = url;

  // 表示
  const result = document.getElementById("result");
  result.innerHTML = "";
  names.forEach((n,i)=>{
    result.innerHTML += `${n} → ${roles[i]}<br>`;
  });
}

/* ===============================
   ゲーム開始
================================ */
function startGame() {
  if (state.players.length === 0) {
    alert("役職生成してください");
    return;
  }

  state.phase = PHASE.MORNING;
  state.day = 1;
  render();
}

/* ===============================
   フェーズ遷移
================================ */
function nextPhase() {

  if (!confirm("次へ進みますか？")) return;

  if (state.phase === PHASE.MORNING) state.phase = PHASE.VOTE;
  else if (state.phase === PHASE.VOTE) state.phase = PHASE.NIGHT;
  else if (state.phase === PHASE.NIGHT) {
    state.phase = PHASE.MORNING;
    state.day++;
  }

  render();
}

/* =============================== */
function forceEnd(){ state.phase = PHASE.RESULT; render(); }

/* 初期描画 */
render();

</script>

</body>
</html>
